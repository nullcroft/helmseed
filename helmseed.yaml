# Git provider: "github" or "gitlab"
provider: ""

# GitLab only: override base URL for self-hosted instances.
# base_url: https://gitlab.example.com

# GitHub org name or GitLab group path
group: ""

# Personal access token.
# Can also be set via HELMSEED_TOKEN env var (preferred).
token: ""

# Only include repos whose name starts with this prefix. Will be stripped from path and dependencies during bootstrap.
# prefix: charts-

# Cache TTL — how long cached repos are considered fresh (Go duration).
# Defaults to 24h if not set.
# cache_ttl: 24h

# Output directory for charts (default: .helm)
# charts_dir: .helm

# Cache directory (default: ~/.cache/helmseed)
# cache_dir: ~/.cache/helmseed

# Skip interactive confirmation prompts (equivalent to --yes flag)
# non_interactive: false
