name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on:
      group: baremetal
      labels: self-hosted
    container: golang:1.26.2-alpine3.22
    steps:
      - name: Install git
        run: apk add --no-cache git

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  lint:
    name: Lint
    runs-on:
      group: baremetal
      labels: self-hosted
    container: golangci/golangci-lint:v2.11.4-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run golangci-lint
        run: golangci-lint run ./...

  sonarqube:
    name: SonarQube
    needs: [test, lint]
    runs-on:
      group: baremetal
      labels: self-hosted
    container:
      image: sonarsource/sonar-scanner-cli:12.1
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run SonarScanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          sonar-scanner \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.qualitygate.wait=true

  build:
    name: Build
    runs-on:
      group: baremetal
      labels: self-hosted
    container: golang:1.26.2-alpine3.22
    needs: [sonarqube]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p bin
          go build -ldflags="-X 'github.com/nullcroft/helmseed/cmd.version=${REF_NAME}'" \
            -o "bin/helmseed-${GOOS}-${GOARCH}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmseed-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/helmseed-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Release
    runs-on:
      group: baremetal
      labels: self-hosted
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
